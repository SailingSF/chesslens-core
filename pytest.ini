[pytest]
DJANGO_SETTINGS_MODULE = config.settings
asyncio_mode = auto
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*

# python-chess 1.999: chess/engine.py aliases asyncio.DefaultEventLoopPolicy at import
# time; that name is deprecated in Python 3.14+. Upstream removed the alias on master;
# drop this when a release includes that change.
filterwarnings =
    ignore:.*DefaultEventLoopPolicy.*:DeprecationWarning:chess.engine
