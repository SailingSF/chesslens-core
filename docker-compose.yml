services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=True
    volumes:
      - .:/app
    # ASGI server with autoreload for dev (source is volume-mounted above).
    # Do not switch back to `runserver`: under WSGI the async views get a fresh
    # event loop per request and every request after the first hangs.
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
